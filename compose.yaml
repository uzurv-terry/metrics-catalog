services:
  metrics-catalog:
    build:
      context: .
    image: metrics-catalog:local
    pull_policy: never
    container_name: metrics-catalog
    init: true
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: "5000"
      AWS_SDK_LOAD_CONFIG: "1"
      AWS_SHARED_CREDENTIALS_FILE: /root/.aws/credentials
      AWS_CONFIG_FILE: /root/.aws/config
    ports:
      - "127.0.0.1:${HOST_PORT:-5050}:5000"
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:5000/health/live', timeout=3).status == 200 else 1)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ${HOME}/.aws:/root/.aws:ro
